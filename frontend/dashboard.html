<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HerdMind-X</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');
:root{--bg:#0a0f0d;--surface:#111a15;--border:#1e2d22;--green:#2dff6e;--amber:#ffb830;--red:#ff4444;--text:#d4e8d8;--muted:#5a7a60;--font-head:'Syne',sans-serif;--font-mono:'Space Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh}
.wrap{max-width:1400px;margin:0 auto;padding:24px}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 32px;border-bottom:1px solid var(--border);margin-bottom:32px}
.logo{font-family:var(--font-head);font-weight:800;font-size:1.6rem}.logo span{color:var(--green)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);animation:pulse 2s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px}
.kpi-label{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.kpi-value{font-family:var(--font-head);font-size:2.4rem;font-weight:800;color:var(--green)}
.kpi-value.warn{color:var(--amber)}.kpi-value.crit{color:var(--red)}
.kpi-sub{font-size:.7rem;color:var(--muted);margin-top:6px}
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:20px;margin-bottom:20px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:20px}
.panel-title{font-family:var(--font-head);font-size:.7rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.tag{background:var(--border);padding:2px 8px;border-radius:2px;font-size:.6rem}
.cow-table{width:100%;border-collapse:collapse}
.cow-table th{text-align:left;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border)}
.cow-table td{padding:12px;font-size:.8rem;border-bottom:1px solid var(--border)}
.cow-table tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:.6rem;font-weight:700}
.badge.normal{background:rgba(45,255,110,.1);color:var(--green)}
.badge.watch{background:rgba(255,184,48,.15);color:var(--amber)}
.badge.critical,.badge.alert{background:rgba(255,68,68,.15);color:var(--red)}
.risk-bar{width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px}
.risk-fill{height:100%;border-radius:2px}
.risk-fill.low{background:var(--green)}.risk-fill.mid{background:var(--amber)}.risk-fill.high{background:var(--red)}
.alert-feed{display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto}
.alert-item{border:1px solid var(--border);border-left:3px solid var(--green);border-radius:2px;padding:12px;font-size:.72rem}
.alert-item.warn{border-left-color:var(--amber)}.alert-item.crit{border-left-color:var(--red)}
.alert-cow{font-family:var(--font-head);font-weight:700;color:var(--green)}
.alert-cow.warn{color:var(--amber)}.alert-cow.crit{color:var(--red)}
.alert-time{color:var(--muted);font-size:.6rem;float:right}
.alert-msg{color:var(--muted);margin-top:4px}
.sparkline-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.spark-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:16px}
.spark-id{font-family:var(--font-head);font-weight:700;font-size:1.1rem;margin-bottom:4px}
.spark-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
svg.spark{width:100%;height:40px}
.spark-stat{display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-top:8px}
.spark-stat span{color:var(--text)}
.footer{border-top:1px solid var(--border);margin-top:32px;padding-top:16px;display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted)}
.loading{color:var(--muted);font-size:.75rem;padding:20px 0;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<header>
<div class="logo">Herd<span>Mind</span>-X</div>
<div style="display:flex;align-items:center;gap:16px;font-size:.75rem;color:var(--muted)">
<div class="pulse"></div>
<span id="status-text">CONNECTING...</span>
<span id="last-update"></span>
</div>
</header>
<div class="kpi-strip">
<div class="kpi"><div class="kpi-label">Total Cows</div><div class="kpi-value" id="kpi-total">5</div><div class="kpi-sub">monitored</div></div>
<div class="kpi"><div class="kpi-label">Avg Risk</div><div class="kpi-value" id="kpi-risk">—</div><div class="kpi-sub">24h average</div></div>
<div class="kpi"><div class="kpi-label">At Risk</div><div class="kpi-value warn" id="kpi-atrisk">—</div><div class="kpi-sub">risk ge 0.8</div></div>
<div class="kpi"><div class="kpi-label">Critical</div><div class="kpi-value crit" id="kpi-critical">—</div><div class="kpi-sub">last hour</div></div>
</div>
<div class="main-grid">
<div class="panel">
<div class="panel-title">Herd Status<span class="tag" id="herd-count">loading</span></div>
<div id="cow-table-wrap"><div class="loading">Loading...</div></div>
</div>
<div class="panel">
<div class="panel-title">Live Alerts<span class="tag" id="alert-count">0</span></div>
<div class="alert-feed" id="alert-feed"><div class="loading">Waiting...</div></div>
</div>
</div>
<div class="sparkline-grid" id="sparkline-grid"></div>
<div class="footer"><span>HerdMind-X Farm Intelligence</span><span>api: localhost:8001</span></div>
</div>
<script>
const API='http://localhost:8001',HERD=[101,102,103,104,105],REFRESH=30000;
let lg=[];
const rc=r=>r>=.9?'crit':r>=.7?'warn':'normal';
const rf=r=>r>=.8?'high':r>=.5?'mid':'low';
async function get(p){const r=await fetch(API+p);if(!r.ok)throw r.status;return r.json()}
function spark(vals,color){
  if(!vals||!vals.length)return '<svg class="spark"></svg>';
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const pts=vals.map((v,i)=>i/(vals.length-1)*100+','+String(40-((v-mn)/rng)*36-2)).join(' ');
  return '<svg class="spark" viewBox="0 0 100 40" preserveAspectRatio="none"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5"/></svg>';
}
async function kpis(){
  try{
    const s=await get('/herd/summary?hours=24');
    const a=await get('/herd/at-risk?threshold=0.8&hours=24');
    const c=await get('/herd/critical');
    document.getElementById('kpi-risk').textContent=(s.avg_risk||0).toFixed(3);
    document.getElementById('kpi-atrisk').textContent=a.count||0;
    document.getElementById('kpi-critical').textContent=c.count||0;
  }catch(e){}
}
async function table(){
  const rows=await Promise.all(HERD.map(async id=>{
    try{
      const l=await get('/cows/'+id+'/latest');
      const w=await get('/temporal/cow/'+id+'/warning');
      return{id,l,w};
    }catch{return{id,l:null,w:null}}
  }));
  document.getElementById('herd-count').textContent=rows.length+' cows';
  let tb='<table class="cow-table"><thead><tr><th>ID</th><th>Risk</th><th>Temp</th><th>Rum</th><th>Status</th><th>Warning</th></tr></thead><tbody>';
  rows.forEach(({id,l,w})=>{
    const r=l?l.risk_score||0:0;
    const t=l?l.temperature||0:0;
    const rum=l?l.rumination||0:0;
    const wl=w&&w.warning_level?w.warning_level:'NORMAL';
    tb+='<tr><td style="font-family:var(--font-head);font-weight:700">COW '+id+'</td>';
    tb+='<td><span class="risk-bar"><span class="risk-fill '+rf(r)+'" style="width:'+(r*100).toFixed(0)+'%"></span></span>'+r.toFixed(3)+'</td>';
    tb+='<td>'+(t.toFixed?t.toFixed(1):t)+'</td>';
    tb+='<td>'+(rum.toFixed?rum.toFixed(0):rum)+'</td>';
    tb+='<td><span class="badge '+rc(r)+'">'+rc(r).toUpperCase()+'</span></td>';
    tb+='<td><span class="badge '+wl.toLowerCase()+'">'+wl+'</span></td></tr>';
  });
  tb+='</tbody></table>';
  document.getElementById('cow-table-wrap').innerHTML=tb;
  rows.forEach(({id,w})=>{if(w&&w.warning_level&&w.warning_level!=='NORMAL'&&w.warning_level!=='NO_DATA')alert_add(id,w.warning_level,w.reasons||[])});
}
function alert_add(id,level,reasons){
  const k=id+'-'+level;if(lg.includes(k))return;lg.push(k);
  const feed=document.getElementById('alert-feed');
  const ld=feed.querySelector('.loading');if(ld)ld.remove();
  const cls=level==='CRITICAL'||level==='ALERT'?'crit':'warn';
  const el=document.createElement('div');el.className='alert-item '+cls;
  el.innerHTML='<span class="alert-time">'+new Date().toLocaleTimeString()+'</span><div class="alert-cow '+cls+'">COW '+id+' — '+level+'</div><div class="alert-msg">'+(reasons[0]||'Condition detected')+'</div>';
  feed.insertBefore(el,feed.firstChild);
  document.getElementById('alert-count').textContent=feed.querySelectorAll('.alert-item').length;
}
async function sparklines(){
  const grid=document.getElementById('sparkline-grid');grid.innerHTML='';
  for(const id of HERD){
    try{
      const tl=await get('/temporal/cow/'+id+'/timeline');
      const rs=tl.fields&&tl.fields.risk_score?tl.fields.risk_score:{};
      const tmp=tl.fields&&tl.fields.temperature?tl.fields.temperature:{};
      const wl=tl.warning&&tl.warning.warning_level?tl.warning.warning_level:'NORMAL';
      const color=wl==='NORMAL'?'var(--green)':wl==='WATCH'?'var(--amber)':'var(--red)';
      const card=document.createElement('div');card.className='spark-card';
      card.innerHTML='<div class="spark-id" style="color:'+color+'">COW '+id+'</div><div class="spark-label">risk 24h</div>'+spark([0,rs.mean||0,rs.max||0,rs.latest||0],color)+'<div class="spark-stat"><span>mean <span>'+(rs.mean||0).toFixed(3)+'</span></span><span>now <span>'+(rs.latest||0).toFixed(3)+'</span></span></div><div class="spark-stat" style="margin-top:4px"><span>temp <span>'+(tmp.latest||0).toFixed(1)+'C</span></span><span class="badge '+wl.toLowerCase()+'" style="font-size:.55rem">'+wl+'</span></div>';
      grid.appendChild(card);
    }catch{
      const card=document.createElement('div');card.className='spark-card';
      card.innerHTML='<div class="spark-id">COW '+id+'</div><div style="color:var(--red);margin-top:8px;font-size:.7rem">unavailable</div>';
      grid.appendChild(card);
    }
  }
}
async function loadAlerts(){
  try{
    const data = await get('/alerts/recent?hours=24&limit=10');
    const feed = document.getElementById('alert-feed');
    const loading = feed.querySelector('.loading');
    if(loading) loading.remove();
    if(!data.alerts || data.alerts.length===0) return;
    data.alerts.forEach(a=>{
      const k = a.cow_id+'-'+a.time;
      if(lg.includes(k)) return;
      lg.push(k);
      const cls = a.alert_level==='CRITICAL'?'crit':'warn';
      const el = document.createElement('div');
      el.className = 'alert-item '+cls;
      const t = new Date(a.time).toLocaleTimeString();
      el.innerHTML = '<span class="alert-time">'+t+'</span><div class="alert-cow '+cls+'">COW '+a.cow_id+' — '+a.alert_level+'</div><div class="alert-msg">Risk score: '+a.risk_score.toFixed(3)+'</div>';
      feed.appendChild(el);
    });
    document.getElementById('alert-count').textContent = feed.querySelectorAll('.alert-item').length;
  }catch(e){console.warn('alerts failed',e)}
}
async function refresh(){
  document.getElementById('status-text').textContent='LIVE';
  document.getElementById('last-update').textContent=new Date().toLocaleTimeString();
  await Promise.all([kpis(),table(),sparklines(),loadAlerts()]);
}
refresh();setInterval(refresh,REFRESH);
</script>
</body>
</html>
