x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16
    container_name: herd_postgres
    environment:
      POSTGRES_USER: herd
      POSTGRES_PASSWORD: herd123
      POSTGRES_DB: herdmind
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herd -d herdmind"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: herd_influx
    ports:
      - "8086:8086"
    volumes:
      - ./infra/influxdb/data:/var/lib/influxdb2
      - ./infra/influxdb/config:/etc/influxdb2
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: herd_redis
    ports:
      - "6379:6379"
    logging: *default-logging
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: herd_mosquitto
    hostname: mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    logging: *default-logging
    restart: unless-stopped

  edge:
    build: ./edge
    container_name: herd_edge
    depends_on:
      - mqtt
    logging: *default-logging
    restart: unless-stopped

  ai_service:
    build: ./services/ai_service
    container_name: herd_ai_service
    init: true
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
      INFLUX_URL: "http://influxdb:8086"
      INFLUX_TOKEN: "cfuR3oHFeBlAbbiIxas5OcXhTY3CZxkz1_QNkAlVrCu48Y6osB-loG7UcGvP1RlN1lRugY7qsAPgHZiu3JteEA=="
      INFLUX_ORG: "herdmind"
      INFLUX_BUCKET: "herd_telemetry"
      MQTT_BROKER: mqtt
      MQTT_PORT: 1883
    depends_on:
      - influxdb
    logging: *default-logging

  risk_service:
    build: ./services/risk_service
    container_name: herd_risk_service
    ports:
      - "8003:8003"
    depends_on:
      - mqtt
      - postgres
    logging: *default-logging
    restart: unless-stopped

  alert_service:
    build: ./services/alert_service
    container_name: herd_alert_service
    init: true
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      TWILIO_WHATSAPP_FROM: "whatsapp:+14155238886"
      TWILIO_SMS_FROM: "+14155238886"
      HERDMIND_ALERT_RECIPIENTS: "+923001234567"
      HERDMIND_SMS_RECIPIENTS: "+923001234567"
      TWILIO_ACCOUNT_SID: "${TWILIO_SID}"
      TWILIO_AUTH_TOKEN: "${TWILIO_TOKEN}"
    volumes:
      - ./services/alert_service/app:/app/app
    depends_on:
      - mqtt
      - redis
    logging: *default-logging

  gateway:
    build: ./services/gateway_service
    container_name: herd_gateway
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: "/app"
    volumes:
      - ./services/gateway_service:/app
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped
