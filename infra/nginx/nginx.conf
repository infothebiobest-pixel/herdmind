upstream gateway_cluster {
    server gateway:8000;
}

server {
    listen 80;
    server_name localhost;

    # Regular HTTP REST API Proxying
    location / {
        proxy_pass http://gateway_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FIX: Catch-all live WebSocket routing block (matches /ws, /ws/, and /ws/alerts)
    location /ws {
        proxy_pass http://gateway_cluster;
        
        # Explicit protocol upgrades
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Turn off internal buffering blocks for zero-latency delivery
        proxy_buffering off;
        proxy_cache off;
        
        # Maintain persistent listening windows
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
