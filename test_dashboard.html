<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerdMind-X · Central Operational Telemetry</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #334155; }
        h1 { margin-top: 0; font-size: 24px; color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 12px; }
        h2 { margin: 0 0 12px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
        .metric { font-size: 36px; font-weight: bold; color: #f1f5f9; }
        .alert-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; font-size: 14px; }
        .critical { color: #f87171; font-weight: bold; }
        .warning { color: #fbbf24; }
        .status-tag { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; background: #22c55e; color: #0f172a; float: right; }
    </style>
</head>
<body>
    <h1>🐄 HerdMind-X Operations Board <span class="status-tag" id="conn-status">INITIALIZING</span></h1>
    
    <div class="grid">
        <div class="card">
            <h2>Total Processed Readings</h2>
            <div class="metric" id="total-readings">-</div>
        </div>
        <div class="card">
            <h2>Average Herd Risk Score</h2>
            <div class="metric" id="avg-risk">-</div>
        </div>
        <div class="card">
            <h2>Max Peak Risk Metric</h2>
            <div class="metric" id="max-risk" style="color: #fbbf24;">-</div>
        </div>
    </div>

    <div class="grid">
        <div class="card" style="grid-column: span 2;">
            <h2>Recent Critical System Incidents</h2>
            <div id="incidents-container">Loading stream alerts...</div>
        </div>
        <div class="card">
            <h2>At-Risk Cattle Inventory</h2>
            <div id="at-risk-container">Loading cache status...</div>
        </div>
    </div>

    <script>
        // Use proxy gateway path on port 80 (or fall back to direct AI service on port 8001)
        const GATEWAY = window.location.origin.includes('3000') ? 'http://localhost:8001' : window.location.origin;

        async function fetchDashboardData() {
            try {
                // 1. Fetch Summary Calculations
                const summaryRes = await fetch(`${GATEWAY}/herd/summary`);
                if (summaryRes.ok) {
                    const data = await summaryRes.json();
                    document.getElementById('total-readings').innerText = data.readings || 0;
                    document.getElementById('avg-risk').innerText = data.avg_risk ? data.avg_risk.toFixed(3) : '0.000';
                    document.getElementById('max-risk').innerText = data.max_risk ? data.max_risk.toFixed(3) : '0.000';
                }

                // 2. Fetch High Risk Detections
                const riskRes = await fetch(`${GATEWAY}/herd/at-risk`);
                if (riskRes.ok) {
                    const data = await riskRes.json();
                    let html = '';
                    if (!data.cows || data.cows.length === 0) {
                        html = '<div style="color: #22c55e; padding: 10px;">🟢 All 5 cows operating within normal parameters.</div>';
                    } else {
                        data.cows.forEach(c => {
                            html += `<div class="alert-row warning"><span>Cow #${c.cow_id}</span><span>Risk: ${(c.risk_score * 100).toFixed(0)}%</span></div>`;
                        });
                    }
                    document.getElementById('at-risk-container').innerHTML = html;
                }

                // 3. Fetch Recent Logged Anomalies
                const alertRes = await fetch(`${GATEWAY}/alerts/recent`);
                if (alertRes.ok) {
                    const data = await alertRes.json();
                    let html = '';
                    if (!data.alerts || data.alerts.length === 0) {
                        html = '<div style="padding: 10px; color: #94a3b8;">No immediate anomaly alarms in storage retention window.</div>';
                    } else {
                        data.alerts.slice(0, 5).forEach(a => {
                            html += `<div class="alert-row"><span class="critical">⚠️ Critical Risk Event (Cow #${a.cow_id})</span><span>Risk Score: ${a.risk_score}</span></div>`;
                        });
                    }
                    document.getElementById('incidents-container').innerHTML = html;
                }
                
                document.getElementById('conn-status').innerText = 'LIVE STREAMING';
                document.getElementById('conn-status').style.background = '#22c55e';
            } catch (err) {
                console.error(err);
                document.getElementById('conn-status').innerText = 'OFFLINE';
                document.getElementById('conn-status').style.background = '#ef4444';
            }
        }

        setInterval(fetchDashboardData, 5000);
        fetchDashboardData();
    </script>
</body>
</html>
