<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HerdMind-X · Enterprise Livestock Intelligence</title>
<style>
:root{
--bg-main:#0f172a;
--bg-card:#1e293b;
--text-main:#e2e8f0;
--text-muted:#94a3b8;
--primary:#38bdf8;
--critical:#ef4444;
--warning:#f59e0b;
}
body{
margin:0;
padding:30px;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg-main);
color:var(--text-main);
}
h1{ margin:0; color:var(--primary); font-weight:800; }
.subtitle{ color:var(--text-muted); }
#stream-status{ display:inline-flex; gap:8px; padding:8px 14px; margin-top:15px; border-radius:20px; font-size:12px; font-weight:bold; }
.connected{ background:#065f46; color:#34d399; }
.disconnected{ background:#991b1b; color:#f87171; }
.stats{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-top:24px; }
.card{ background:var(--bg-card); padding:18px; border-radius:8px; border: 1px solid #334155; }
.big{ font-size:32px; font-weight:800; margin-top:5px; }
#total{ color:var(--primary); }
#critical{ color:var(--critical); }
#warning{ color:var(--warning); }
#alert-log{ margin-top:25px; display:flex; flex-direction:column; gap:14px; }
.alert{ background:var(--bg-card); padding:16px; border-left:6px solid var(--critical); border-radius:6px; border-top:1px solid #334155; border-right:1px solid #334155; border-bottom:1px solid #334155; }
.warning-card { border-left-color:var(--warning); }
.badge{ padding:4px 8px; font-size:11px; border-radius:4px; font-weight:bold; float:right; text-transform:uppercase; }
.critical-badge{ background:#7f1d1d; color:#fca5a5; }
.warning-badge{ background:#78350f; color:#fde68a; }
.recommendation-box { background:#0f172a; padding:10px; border-radius:4px; font-size:13px; margin-top:10px; border:1px solid #334155; color:#cbd5e1; }
.metrics-row { font-size:13px; color:var(--text-muted); margin-top:6px; }
</style>
</head>
<body>

<h1>HerdMind-X Operations Board</h1>
<p class="subtitle">Phase 2 · State-Aware Real-Time Diagnostic Stream</p>
<div id="stream-status" class="disconnected">● Connecting…</div>

<div class="stats">
    <div class="card"><div>Total Incidents</div><div class="big" id="total">0</div></div>
    <div class="card"><div>Critical Escalations</div><div class="big" id="critical">0</div></div>
    <div class="card"><div>Warning Anomalies</div><div class="big" id="warning">0</div></div>
</div>

<div id="alert-log"></div>

<script>
const statusEl = document.getElementById("stream-status");
const logEl = document.getElementById("alert-log");
let counters = { total: 0, critical: 0, warning: 0 };

function updateCounters(level) {
    counters.total++;
    if (level === "CRITICAL") counters.critical++;
    if (level === "WARNING") counters.warning++;
    document.getElementById("total").innerText = counters.total;
    document.getElementById("critical").innerText = counters.critical;
    document.getElementById("warning").innerText = counters.warning;
}

function renderAlert(e) {
    const card = document.createElement("div");
    card.className = `alert ${e.alert_level === "WARNING" ? "warning-card" : ""}`;
    card.innerHTML = `
        <div>
            <b>Livestock Index: Cow #${e.cow_id}</b>
            <span class="badge ${e.alert_level === "WARNING" ? "warning-badge" : "critical-badge"}">${e.alert_level}</span>
        </div>
        <div style="margin-top:8px; font-weight:600;">Diagnosis Insight: ${(e.disease || "UNKNOWN").replaceAll("_", " ").toUpperCase()}</div>
        <div class="metrics-row">📈 Moving Window Variance: +${e.temp_delta || 0}°C | Risk Weight: ${Number(e.risk_score).toFixed(3)}</div>
        <div class="recommendation-box"><strong>Agent Directive:</strong> ${e.message || "Monitor biological parameters closely."}</div>
    `;
    logEl.insertBefore(card, logEl.firstChild);
}

const mockToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbl9mYXJtZXIiLCJleHAiOjE3ODE5MzkzNTgsInJvbGUiOiJmYXJtX21hbmFnZXIifQ.x7acVBEFz2GVdOqGDAd65dBKf4dgerZNrgyVyD4DfDk";
const ws = new WebSocket(`ws://127.0.0.1:8000/ws/alerts?token=${mockToken}`);

ws.onopen = () => { statusEl.className = "connected"; statusEl.innerText = "● Stream Running"; };
ws.onclose = () => { statusEl.className = "disconnected"; statusEl.innerText = "● Disconnected"; };
ws.onmessage = (msg) => {
    try {
        const e = JSON.parse(msg.data);
        if (e.event_type !== "AGENT_ALERT") return;
        updateCounters(e.alert_level);
        renderAlert(e);
    } catch (err) { console.error("Parse exception:", err); }
};
</script>
</body>
</html>
