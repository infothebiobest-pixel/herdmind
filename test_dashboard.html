<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerdMind-X · Central Operational Telemetry</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card { background: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #334155; }
        h1 { margin-top: 0; font-size: 24px; color: #38bdf8; border-bottom: 2px solid #334155; padding-bottom: 12px; }
        h2 { margin: 0 0 12px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
        .metric { font-size: 36px; font-weight: bold; color: #f1f5f9; }
        .alert-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; font-size: 14px; align-items: center; }
        .critical { color: #f87171; font-weight: bold; }
        .warning { color: #fbbf24; }
        .recovered { color: #22c55e; font-size: 12px; font-weight: normal; border: 1px solid #22c55e; padding: 2px 6px; border-radius: 4px; }
        .status-tag { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; background: #22c55e; color: #0f172a; float: right; }
    </style>
</head>
<body>
    <h1>🐄 HerdMind-X Operations Board <span class="status-tag" id="conn-status">INITIALIZING</span></h1>
    
    <div class="grid">
        <div class="card">
            <h2>Total Processed Readings</h2>
            <div class="metric" id="total-readings">-</div>
        </div>
        <div class="card">
            <h2>Average Herd Risk Score</h2>
            <div class="metric" id="avg-risk">-</div>
        </div>
        <div class="card">
            <h2>Active Incidents (Latched)</h2>
            <div class="metric" id="incident-count" style="color: #f87171;">0</div>
        </div>
    </div>

    <div class="grid">
        <div class="card" style="grid-column: span 2;">
            <h2>Persistent Critical System Incidents</h2>
            <div id="incidents-container">No active incidents tracked.</div>
        </div>
        <div class="card">
            <h2>At-Risk Cattle Inventory (Live)</h2>
            <div id="at-risk-container">Loading cache status...</div>
        </div>
    </div>

    <script>
        const GATEWAY = window.location.origin.includes('3000') ? 'http://localhost:8001' : window.location.origin;
        
        // Persistent client-side memory cache for latching alerts
        const latchedIncidents = new Map();

        async function fetchDashboardData() {
            try {
                // 1. Fetch Summary Calculations
                const summaryRes = await fetch(`${GATEWAY}/herd/summary`);
                if (summaryRes.ok) {
                    const data = await summaryRes.json();
                    document.getElementById('total-readings').innerText = data.readings || 0;
                    document.getElementById('avg-risk').innerText = data.avg_risk ? data.avg_risk.toFixed(3) : '0.000';
                }

                // 2. Fetch Live High-Risk Detections to feed the Latch Engine
                const riskRes = await fetch(`${GATEWAY}/herd/at-risk`);
                if (riskRes.ok) {
                    const data = await riskRes.json();
                    
                    // LATCH LOGIC: Add newly discovered at-risk cows to our persistent local cache map
                    if (data.cows && data.cows.length > 0) {
                        data.cows.forEach(c => {
                            latchedIncidents.set(c.cow_id, {
                                cow_id: c.cow_id,
                                risk_score: c.risk_score,
                                timestamp: new Date().toLocaleTimeString(),
                                consecutiveHealthyCycles: 0
                            });
                        });
                    }

                    // Render Live Inventory Map
                    let inventoryHtml = '';
                    if (!data.cows || data.cows.length === 0) {
                        inventoryHtml = '<div style="color: #22c55e; padding: 10px;">🟢 Current snapshot shows all cows stable.</div>';
                    } else {
                        data.cows.forEach(c => {
                            inventoryHtml += `<div class="alert-row warning"><span>Cow #${c.cow_id}</span><span>Risk: ${(c.risk_score * 100).toFixed(0)}%</span></div>`;
                        });
                    }
                    document.getElementById('at-risk-container').innerHTML = inventoryHtml;
                }

                // 3. Process Latch Maintenance & Recovery Verification Loop
                // For each latched alert, cross-reference its individual latest metric score
                for (let [cowId, incident] of latchedIncidents.entries()) {
                    try {
                        const cowRes = await fetch(`${GATEWAY}/cows/${cowId}/latest`);
                        if (cowRes.ok) {
                            const cowData = await cowRes.json();
                            
                            if (cowData.risk_score < 0.50) {
                                incident.consecutiveHealthyCycles += 1;
                                incident.risk_score = cowData.risk_score; // Track current recovery state
                            } else {
                                incident.consecutiveHealthyCycles = 0; // Reset counter if risk surges again
                                incident.risk_score = cowData.risk_score;
                            }
                        }
                    } catch (e) { console.error(`Error querying cow ${cowId} profile:`, e); }

                    // RECOVERY LOGIC: Alert only drops off once the cow maintains stability for 3 consecutive refresh cycles (15s)
                    if (incident.consecutiveHealthyCycles >= 3) {
                        latchedIncidents.delete(cowId);
                    }
                }

                // Render Latched Incidents Panel Layout
                let incidentsHtml = '';
                document.getElementById('incident-count').innerText = latchedIncidents.size;
                
                if (latchedIncidents.size === 0) {
                    incidentsHtml = '<div style="padding: 10px; color: #94a3b8;">🟢 Operational state normal. No persistent incidents in queue.</div>';
                } else {
                    latchedIncidents.forEach((incident, cowId) => {
                        const isHealing = incident.consecutiveHealthyCycles > 0;
                        incidentsHtml += `
                            <div class="alert-row">
                                <span class="critical">⚠️ LATCHED ALARM: Cow #${cowId}</span>
                                <span>Risk Weight: ${incident.risk_score.toFixed(3)}</span>
                                <span>First Detected: ${incident.timestamp}</span>
                                ${isHealing ? `<span class="recovered">Stabilizing (Cycle ${incident.consecutiveHealthyCycles}/3)</span>` : '<span style="color: #ef4444; font-size: 12px;">Active Risk</span>'}
                            </div>`;
                    });
                }
                document.getElementById('incidents-container').innerHTML = incidentsHtml;
                
                document.getElementById('conn-status').innerText = 'LIVE STREAMING';
                document.getElementById('conn-status').style.background = '#22c55e';
            } catch (err) {
                console.error(err);
                document.getElementById('conn-status').innerText = 'OFFLINE';
                document.getElementById('conn-status').style.background = '#ef4444';
            }
        }

        setInterval(fetchDashboardData, 5000);
        fetchDashboardData();
    </script>
</body>
</html>
